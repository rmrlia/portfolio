<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abegail E. Ramiro – Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #4EC9E1;
      --sky-light: #A8E6F0;
      --sky-dark: #1AACCC;
      --dark: #1a1a2e;
      --text: #2d2d2d;
      --muted: #6b7280;
      --bg: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 64px;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid rgba(78,201,225,0.12);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon { width: 46px; height: 46px; }

    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }

    .logo-text span:first-child {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--dark);
    }

    .logo-text span:last-child {
      font-size: 8px;
      letter-spacing: 2.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--dark);
      border-radius: 2px;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      position: relative;
      padding-bottom: 4px;
    }

    .nav-links a:hover,
    .nav-links a.active { color: #74ccff; }

    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: #74ccff;
      border-radius: 2px;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: calc(100vh - 90px);
      padding: 90px 80px 60px;
      gap: 60px;
    }

    /* LEFT */
    .hero-left {
      flex: 0 0 50%;
      max-width: 520px;
    }

    .greeting {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 5vw, 72px);
      font-weight: 700;
      color: #74ccff;
      line-height: 1.1;
      margin-bottom: 40px;
    }

    .hero-bio {
      font-size: 18px;
      line-height: 1.9;
      color: var(--muted);
      text-align: justify;
      margin-bottom: 50px;
      max-width: 520px;
    }

    .btn-hire {
      display: inline-block;
      padding: 16px 48px;
      background: #74ccff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(78,201,225,0.35);
    }

    .btn-hire:hover { background: #1e6c9a; }

    /* SOCIAL */
    .social-links {
      display: flex;
      gap: 22px;
      margin-top: 30px;
    }

    .social-links a {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f1f5f9;
      color: #353546;
      text-decoration: none;
    }

    .social-links a:hover { background: #74ccff; color: #fff; }

    .social-links svg { width: 20px; height: 20px; fill: currentColor; }

    /* RIGHT */
    .hero-right {
      flex: 0 0 48%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .photo-wrap {
      width: 440px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-wrap img {
      width: 100%;
      max-width: 440px;
      height: auto;
      object-fit: contain;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .hero { padding: 60px 40px; gap: 40px; }
      .photo-wrap { width: 360px; }
    }

    @media (max-width: 768px) {
      nav { padding: 16px 24px; }

      .hamburger { display: flex; }

      .nav-links {
        display: none;
        flex-direction: column;
        gap: 0;
        position: absolute;
        top: 100%;
        left: 0; right: 0;
        background: #fff;
        border-bottom: 1px solid rgba(78,201,225,0.15);
        padding: 8px 0;
        z-index: 200;
      }

      .nav-links.open { display: flex; }

      .nav-links li a {
        display: block;
        padding: 12px 24px;
        font-size: 15px;
      }

      .hero {
        flex-direction: column-reverse;
        padding: 36px 24px 48px;
        min-height: auto;
        gap: 32px;
      }

      .hero-left { flex: none; max-width: 100%; }
      .hero-right { flex: none; width: 100%; }

      .photo-wrap { width: 260px; }

      .hero-name { font-size: clamp(36px, 9vw, 52px); margin-bottom: 24px; }
      .greeting { font-size: 18px; }
      .hero-bio { font-size: 15px; margin-bottom: 32px; }
      .btn-hire { padding: 14px 36px; font-size: 15px; }
    }

    @media (max-width: 480px) {
      .photo-wrap { width: 200px; }
      .hero { padding: 28px 16px 40px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <svg class="logo-icon" viewBox="0 0 46 46" fill="none">
      <circle cx="13" cy="13" r="11" fill="#4EC9E1" opacity="0.85"/>
      <circle cx="33" cy="13" r="11" fill="#74D9ED" opacity="0.7"/>
      <circle cx="13" cy="33" r="11" fill="#74D9ED" opacity="0.7"/>
      <circle cx="33" cy="33" r="11" fill="#4EC9E1" opacity="0.85"/>
    </svg>
    <div class="logo-text">
      <span>PIXORA</span>
      <span>Design · Code · Create</span>
    </div>
  </a>

  <div class="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>

  <ul class="nav-links" id="navMenu">
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="certificates.html">Certificates</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="project.html">Projects</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <p class="greeting">Hi I am</p>
    <h1 class="hero-name">Abegail E. Ramiro</h1>
    <p class="hero-bio">
      I build responsive, user-friendly, and modern websites and mobile applications
      that deliver great user experiences and clean functionality.
    </p>
    <a href="contact.html" class="btn-hire">Hire Me</a>
    <div class="social-links"></div>
  </div>
  <div class="hero-right">
    <div class="photo-wrap">
      <img src="pic.jpg" alt="Profile Image">
    </div>
  </div>
</section>

<script>
  function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('open');
  }
</script>
</body>
</html>
